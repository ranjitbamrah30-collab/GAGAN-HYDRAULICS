function gid() { return Date.now().toString(36) + Math.random().toString(36).substr(2,4); }

  if (!d) return "—";
  try { return new Date(d).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}); }

function lsGet(k,def) {
  try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : def; }
  catch(e) { return def; }
}
function lsSet(k,v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }

function showSyncStatus(msg, color) {}

function syncUp(key, data) {
  lsSet("gh_" + key[0], data);
  if (!db) { showSyncStatus("No Firebase!", "#f44336"); return; }
  showSyncStatus("Saving " + key + "...", "#1565c0");
  db.collection("gh").doc(key).set({d: JSON.stringify(data)})
    .then(function(){ showSyncStatus("Saved: " + key, "#2e7d32"); })
    .catch(function(e){ showSyncStatus("FAILED: " + e.code, "#f44336"); console.error("syncUp err", key, e); });
}

function ss(p) {
  for (var k in p) S[k] = p[k];
  if (p.master !== undefined) syncUp("master", S.master);
  if (p.orders !== undefined) syncUp("orders", S.orders);
  if (p.users  !== undefined) syncUp("users",  S.users);
  draw();
}

function dv(cls, txt) { var d = mk("div",cls); if (txt !== undefined) d.textContent = txt; return d; }
function ap(p) {
  for (var i=1;i<arguments.length;i++) {
    var c=arguments[i];
    if (c==null||c===false||c===undefined) continue;
    if (typeof c==="string"||typeof c==="number") p.appendChild(document.createTextNode(String(c)));
    else p.appendChild(c);
  }
  return p;

  closeModal();

  b.style.transform="translateY(100%)";
  requestAnimationFrame(function(){ b.style.transition="transform .25s"; b.style.transform="translateY(0)" });
}
function closeModal() { if (_mo) { _mo.remove(); _mo=null; } }
function confirmDel(msg, fn) {
  var c=dv(""); var p=mk("p"); p.textContent=msg; p.style.cssText="color:#444;font-size:14px;margin-bottom:16px";

  ap(r, bt("bs sm","Cancel",closeModal), bt("bd sm","DELETE",function(){fn();closeModal()}));
  ap(c,p,r); modal("Confirm Delete",c);
}

function drawNav() {
  var nav=document.getElementById("nav"); nav.innerHTML="";

  if (S.screen==="order") active="home";
  if (S.screen==="compDetail"||S.screen==="codeDetail") active="master";
  items.forEach(function(item) {
    var b=dv("ni"+(active===item.id?" on":""));
    ap(b,dv("nic",item.ic),item.lb);
    b.onclick=(function(id){return function(){ss({screen:id});}})(item.id);
    nav.appendChild(b)
  });
}

function drawInspect(order,insp,allKeys,pass,fail,filled,pct) {

    ap(tnr,arrow,tnm,isRdy?bdg("✓","#e8f5e9","#2e7d32"):"");
    var tsb=dv("",cf+"/"+ckeys.length+" inspected"); tsb.style.cssText="font-size:12px;color:#666;margin-top:3px";
    ap(ti,tnr,tsb);
    var rb=mk("button"); rb.textContent=isRdy?"✕ Not Ready":"✓ Ready";
    rb.style.cssText="background:"+(isRdy?"#c62828":"#2e7d32")+";color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;min-height:40px;white-space:nowrap;font-family:Arial,sans-serif";

    ap(ch,ti,rb);
    var body=dv(""); body.style.display="none";
    ch.onclick=(function(bd,ar,rbtn){return function(e){if(e.target===rbtn||rbtn.contains(e.target))return;var open=bd.style.display!=="none";bd.style.display=open?"none":"block";ar.textContent=open?"▶":"▼";ar.style.color=open?"#999":"#1565c0";}})(body,arrow,rb);
    ap(cc,ch,body);
    codes.forEach(function(code){
      var cbar=dv("fl ai gap8"); cbar.style.cssText="padding:10px 14px;background:#f8f9ff;border-top:1px solid #eee;flex-wrap:wrap";
      var cnm=mk("span"); cnm.style.cssText="background:#1565c0;color:#fff;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:700"; cnm.textContent=code.codeNo;
      ap(cbar,cnm,code.description?document.createTextNode(" "+code.description):"");

      thead.appendChild(hr); tbl.appendChild(thead); var tbody=mk("tbody");

      tbl.appendChild(tbody); tw.appendChild(tbl); ap(body,cbar,tw)
    });
    w.appendChild(cc)
  });
  return w;

function drawSummary(insp) {
  var allKeys=[];
  S.master.forEach(function(c){c.codes.forEach(function(k){k.dimensions.forEach(function(d){allKeys.push(c.id+"__"+k.id+"__"+d.id)})})});
  var total=allKeys.length,pass=0,fail=0;
  allKeys.forEach(function(k){var r=insp[k];if(r){if(r.status==="Pass")pass++;else if(r.status==="Fail")fail++;}});
  var w=dv(""); var sg=dv("sg");
  [{l:"Total",v:total,c:"#1565c0"},{l:"Pass",v:pass,c:"#2e7d32"},{l:"Fail",v:fail,c:"#c62828"},{l:"Pending",v:total-pass-fail,c:"#888"}].forEach(function(s){
    var card=dv("card"); card.style.textAlign="center";
    var sv=dv("",String(s.v)); sv.style.cssText="font-size:28px;font-weight:700;color:"+s.c;
    var sl2=dv("",s.l); sl2.style.cssText="font-size:12px;color:#666;margin-top:2px";
    ap(card,sv,sl2); sg.appendChild(card)
  });
  w.appendChild(sg);
  S.master.forEach(function(comp){
    comp.codes.forEach(function(code){
      if (!code.dimensions.length) return;
      var keys=code.dimensions.map(function(d){return comp.id+"__"+code.id+"__"+d.id});
      var t=keys.length,p=0,f=0;
      keys.forEach(function(k){var r=insp[k];if(r){if(r.status==="Pass")p++;else if(r.status==="Fail")f++;}});
      var pe=t-p-f; var rdy=insp["__r__"+comp.id]&&insp["__r__"+comp.id].ready;
      var res=f>0?"FAIL":pe===0&&p===t?"PASS":"PENDING";
      var rc=res==="PASS"?"#2e7d32":res==="FAIL"?"#c62828":"#888";
      var card=dv("card"); var top=dv("fl jsb ai"); var info=dv("");
      var nm=dv("",comp.name); nm.style.fontWeight="700";
      var cn=dv("",code.codeNo); cn.style.cssText="color:#1565c0;font-weight:700;font-size:13px";
      ap(info,nm,cn); ap(top,info,bdg(res,res==="PASS"?"#e8f5e9":res==="FAIL"?"#ffebee":"#f5f5f5",rc));
      var stats=dv("fl gap8"); stats.style.cssText="margin-top:8px;font-size:13px;align-items:center;flex-wrap:wrap";
      var sp=dv("","✓ "+p); sp.style.color="#2e7d32";
      var sf=dv("","✗ "+f); sf.style.color="#c62828";
      var se=dv("","◌ "+pe); se.style.color="#888";
      ap(stats,sp,sf,se,bdg(rdy?"✓ Ready":"Not Ready",rdy?"#e8f5e9":"#f5f5f5",rdy?"#2e7d32":"#888"));
      ap(card,top,stats); w.appendChild(card)
    })
  });
  return w;
}

function exportProdPDF(orders){
  if(!orders||!orders.length){alert("No orders.");return;}
  var ROWS_PER_PAGE=10;
  var today=new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
  var theader="<thead><tr><th>#<\/th><th>Serial No<\/th><th>Customer<\/th><th>PO No<\/th><th>Delivery<\/th><th>Model<\/th><th>Motor<\/th><th>Stage<\/th><\/tr><\/thead>";
  var pages="";
  var totalPages=Math.ceil(orders.length/ROWS_PER_PAGE);
  for(var p=0;p<totalPages;p++){
    var pageOrders=orders.slice(p*ROWS_PER_PAGE,(p+1)*ROWS_PER_PAGE);
    var rows="";
    for(var i=0;i<pageOrders.length;i++){
      var o=pageOrders[i];var sp=o.specs||{};var stg=o.stage||"Waiting";var num=p*ROWS_PER_PAGE+i+1;
      rows+="<tr class='rt'><td class='num' rowspan='2'>"+num+"<\/td><td class='sn'>"+o.sn+"<\/td><td>"+o.cust+"<\/td><td>"+o.po+"<\/td><td>"+fd(o.delivery)+"<\/td><td>"+(sp.model||"—")+"<\/td><td>"+(sp.motor||"—")+"<\/td><td class='stg'>"+stg+"<\/td><\/tr>";
      rows+="<tr class='rb'><td><b>Pump:<\/b> "+(sp.pump||"—")+"<\/td><td><b>Cylinder:<\/b> "+(sp.cyl||"—")+"<\/td><td><b>Tank:<\/b> "+(sp.tank||"—")+"<\/td><td colspan='5'><b>Accessories:<\/b> "+(sp.acc||"—")+"<\/td><\/tr>";
    }
    var isLast=p===totalPages-1;
    pages+="<div class='"+(isLast?"pg":"pg brk")+"'>";
    pages+="<div class='lh'><div><div class='co'>&#9881; GAGAN HYDRAULICS<\/div><div class='cs'>Production Order Sheet — "+today+"<\/div><\/div><div class='pn'>"+orders.length+" orders | Page "+(p+1)+" of "+totalPages+"<\/div><\/div>";

    pages+="<table>"+theader+"<tbody>"+rows+"<\/tbody><\/table>";
    pages+="<div class='ft'><span>Gagan Hydraulics — Internal Document<\/span><span>"+today+"<\/span><\/div>";
    pages+="<\/div>";
  }
  var css="*{box-sizing:border-box;margin:0;padding:0}html,body{margin:0;padding:0}body{font-family:Arial,sans-serif;font-size:13px;color:#222}.pg{padding:5mm 6mm;overflow:hidden}.brk{page-break-after:always;break-after:page}.lh{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #1565c0;padding-bottom:5px;margin-bottom:5px}.co{font-size:18px;font-weight:700;color:#1565c0}.cs{font-size:11px;color:#555;margin-top:2px;font-weight:600}.pn{font-size:11px;color:#666;text-align:right}.note{background:#fff8e1;border:1px solid #ffcc80;padding:4px 10px;font-size:11px;color:#e65100;margin:0 0 5px;font-weight:600}table{width:100%;border-collapse:collapse;table-layout:fixed}th{background:#1565c0;color:#fff;padding:6px 8px;text-align:left;font-size:12px;text-transform:uppercase;white-space:nowrap}td{padding:5px 8px;vertical-align:middle;font-size:12px;word-wrap:break-word}.rt td{border-top:1px solid #ccc;background:#fff}.rb td{border-bottom:1px solid #ccc;background:#f5f7ff}.num{width:26px;text-align:center;color:#aaa;font-weight:700;border-right:1px solid #ddd;background:#f0f4ff!important}.sn{font-weight:700;color:#1565c0;white-space:nowrap}.stg{font-weight:700;color:#2e7d32;white-space:nowrap}.ft{margin-top:5px;border-top:1px solid #eee;padding-top:4px;font-size:10px;color:#bbb;display:flex;justify-content:space-between}@media print{@page{size:A4 landscape;margin:0}html,body{margin:0;padding:0}.pg{padding:5mm 6mm}.brk{page-break-after:always;break-after:page}th,.num{-webkit-print-color-adjust:exact;print-color-adjust:exact}}";

  pdfOverlay("Production Order Sheet",content);
}

function exportInspPDF(order,master,insp){
  var allKeys=[];master.forEach(function(c){c.codes.forEach(function(k){k.dimensions.forEach(function(d){allKeys.push(c.id+"__"+k.id+"__"+d.id)})})});
  var total=allKeys.length,pass=0,fail=0;
  allKeys.forEach(function(k){var r=insp[k];if(r){if(r.status==="Pass")pass++;else if(r.status==="Fail")fail++;}});
  var sp=order.specs||{};var rows="";
  master.forEach(function(comp){
    if(!comp.codes.some(function(k){return k.dimensions.length}))return;
    rows+="<tr style='background:#1565c0;color:#fff'><td colspan='8' style='padding:7px 10px;font-weight:700'>"+comp.name+"<\/td><\/tr>";
    comp.codes.forEach(function(code){
      if(!code.dimensions.length)return;
      rows+="<tr style='background:#e3f2fd'><td colspan='8' style='padding:5px 10px;font-weight:700;color:#1565c0'>"+code.codeNo+(code.description?" — "+code.description:"")+"<\/td><\/tr>";
      code.dimensions.forEach(function(dim){
        var key=comp.id+"__"+code.id+"__"+dim.id;var row=insp[key]||{};
        var bg=row.status==="Pass"?"#e8f5e9":row.status==="Fail"?"#ffebee":"#f5f5f5";
        var tc=row.status==="Pass"?"#2e7d32":row.status==="Fail"?"#c62828":"#888";
        rows+="<tr><td style='font-weight:700'>"+dim.name+"<\/td><td>"+(dim.standardValue||"—")+"<\/td><td>±"+(dim.tolerance||"—")+"<\/td><td>"+dim.unit+"<\/td><td>"+(row.actual||"—")+"<\/td><td style='background:"+bg+";color:"+tc+";font-weight:700'>"+(row.status||"Pending")+"<\/td><td>"+(row.inspector||"—")+"<\/td><td>"+(row.remarks||"—")+"<\/td><\/tr>"
      })
    })
  });
  var css="*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;font-size:11px;padding:16px}.lh{border-bottom:3px solid #1565c0;padding-bottom:10px;margin-bottom:12px;display:flex;justify-content:space-between}.co{font-size:18px;font-weight:700;color:#1565c0}.mg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}.mf{background:#f5f5f5;padding:8px;border-radius:4px}.ml{font-size:9px;color:#888;font-weight:700;text-transform:uppercase;margin-bottom:2px}.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}.scc{background:#f5f5f5;padding:10px;text-align:center;border-radius:4px}.sn{font-size:20px;font-weight:700}table{width:100%;border-collapse:collapse;font-size:10px}th{background:#444;color:#fff;padding:5px 8px;text-align:left}td{padding:4px 8px;border-bottom:1px solid #eee}@media print{@page{size:A4;margin:10mm}body{padding:0}}";
  var html="<!DOCTYPE html><html><head><meta charset='utf-8'><style>"+css+"<\/style><\/head><body><div class='lh'><div><div class='co'>&#9881; GAGAN HYDRAULICS<\/div><div style='font-size:12px;color:#555;margin-top:3px'>Inspection Report<\/div><\/div><div style='text-align:right;font-size:10px;color:#999'>"+new Date().toLocaleString("en-IN")+"<\/div><\/div><div class='mg'><div class='mf'><div class='ml'>Serial No<\/div>"+order.sn+"<\/div><div class='mf'><div class='ml'>PO No<\/div>"+order.po+"<\/div><div class='mf'><div class='ml'>Customer<\/div>"+order.cust+"<\/div><div class='mf'><div class='ml'>Delivery<\/div>"+fd(order.delivery)+"<\/div><\/div>"+(sp.model?"<div class='mg'><div class='mf'><div class='ml'>Model<\/div>"+sp.model+"<\/div><div class='mf'><div class='ml'>Motor<\/div>"+(sp.motor||"—")+"<\/div><div class='mf'><div class='ml'>Pump<\/div>"+(sp.pump||"—")+"<\/div><div class='mf'><div class='ml'>Cylinder<\/div>"+(sp.cyl||"—")+"<\/div><\/div>":"")+"<div class='sg'><div class='scc'><div class='sn'>"+total+"<\/div><div>Total<\/div><\/div><div class='scc'><div class='sn' style='color:#2e7d32'>"+pass+"<\/div><div>Pass<\/div><\/div><div class='scc'><div class='sn' style='color:#c62828'>"+fail+"<\/div><div>Fail<\/div><\/div><div class='scc'><div class='sn' style='color:#888'>"+(total-pass-fail)+"<\/div><div>Pending<\/div><\/div><\/div><table><thead><tr><th>Dimension<\/th><th>Standard<\/th><th>Tolerance<\/th><th>Unit<\/th><th>Actual<\/th><th>Status<\/th><th>Inspector<\/th><th>Remarks<\/th><\/tr><\/thead><tbody>"+rows+"<\/tbody><\/table><\/body><\/html>";
  pdfOverlay("Inspection Report",html);
}

function draw(){
  var scr=document.getElementById("scr");if(!scr)return;
  scr.innerHTML="";closeModal();
  var content;
  try{
    if(S.screen==="home")content=drawHome();
    else if(S.screen==="order")content=drawOrder();
    else if(S.screen==="master")content=drawMaster();
    else if(S.screen==="compDetail")content=drawCompDetail();
    else if(S.screen==="codeDetail")content=drawCodeDetail();
    else if(S.screen==="users")content=drawUsers();
    else if(S.screen==="reports")content=drawReports();
    else content=drawHome();
  }catch(e){content=dv("pg");var err=dv("card");err.style.color="#c62828";err.textContent="Error: "+e.message+(e.stack?" | "+e.stack.split("\n")[1]:"");content.appendChild(err);console.error(e);}
  scr.appendChild(content);drawNav();
}
function loadAndDraw() {
  if (!db) { draw(); return; }
  var screl = document.getElementById("scr");
  if (screl) screl.innerHTML = "<div style='display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px'><div style='font-size:48px'>&#9881;</div><div style='font-size:20px;font-weight:700;color:#1565c0'>GAGAN HYDRAULICS</div><div style='font-size:13px;color:#888'>Syncing...</div></div>";

  var loaded = false;

  // Real-time listeners — fire immediately on load AND on every remote change
  db.collection("gh").doc("orders").onSnapshot(function(doc) {
    if (!doc.exists) { if (!loaded) { loaded=true; draw(); } return; }
    var fresh = JSON.parse(doc.data().d);
    var changed = JSON.stringify(fresh) !== JSON.stringify(S.orders);
    S.orders = fresh; lsSet("gh_o", fresh);
    if (loaded && changed) { showSyncStatus("RECEIVED UPDATE FROM CLOUD! Orders synced.", "#7b1fa2"); draw(); }
    else if (!loaded) { loaded=true; draw(); }
  }, function(e) { showSyncStatus("Sync error: "+e.code, "#f44336"); console.error("orders snap err", e); });

  db.collection("gh").doc("master").onSnapshot(function(doc) {
    if (!doc.exists) return;
    var fresh = JSON.parse(doc.data().d);
    S.master = fresh; lsSet("gh_m", fresh);
    if (loaded) draw();
  }, function(e) { console.warn("master snap err", e); });

  db.collection("gh").doc("users").onSnapshot(function(doc) {
    if (!doc.exists) return;
    var fresh = JSON.parse(doc.data().d);
    S.users = fresh; lsSet("gh_u", fresh);
    if (loaded) draw();
  }, function(e) { console.warn("users snap err", e); });

  // Initial load — wait for all 3 then draw once
  Promise.all([
    db.collection("gh").doc("master").get(),
    db.collection("gh").doc("orders").get(),
    db.collection("gh").doc("users").get()
  ]).then(function(docs) {
    if (docs[0].exists) { S.master = JSON.parse(docs[0].data().d); lsSet("gh_m", S.master); }
    if (docs[1].exists) { S.orders = JSON.parse(docs[1].data().d); lsSet("gh_o", S.orders); }
    if (docs[2].exists) { S.users  = JSON.parse(docs[2].data().d); lsSet("gh_u", S.users); }
    loaded = true;
    draw();
  }).catch(function(e) { console.warn("Firebase load failed, using local", e); loaded=true; draw(); });
}
loadAndDraw();
</script>
